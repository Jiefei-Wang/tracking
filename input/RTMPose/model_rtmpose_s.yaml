default:
  type: RTMPose
  image_mean: [0.485, 0.456, 0.406]
  image_std: [0.229, 0.224, 0.225]
  pretrain:
    load_mode: auto
    expected_size: s
    checkpoint: input/DeepLabCutModelZoo-SuperAnimal-Quadruped/superanimal_quadruped_rtmpose_s.pt
  data:
    bbox_margin: 20.0
    train:
      normalize_images: true
      hflip:
        p: 0.5
      affine:
        p: 1.0
        rotation: 30.0
        scaling: [0.75, 1.25]
        translation: 40
      random_bbox_transform:
        p: 1.0
        shift_factor: 0.16
        shift_prob: 0.3
        scale_factor: [0.75, 1.25]
        scale_prob: 1.0
      motion_blur: true
      gaussian_noise: 12.75
      top_down_crop:
        width: 256
        height: 256
        margin: 0
        crop_with_context: true
  model:
    backbone:
      type: CSPNeXt
      model_name: cspnext_s
      freeze_bn_stats: false
      freeze_bn_weights: false
      deepen_factor: 0.33
      widen_factor: 0.5
    heads:
      bodypart:
        type: RTMCCHead
        weight_init: RTMPose
        target_generator:
          type: SimCCGenerator
          input_size: [256, 256]
          smoothing_type: gaussian
          sigma: [5.66, 5.66]
          simcc_split_ratio: 2.0
          label_smooth_weight: 0.0
          normalize: false
        criterion:
          x:
            type: KLDiscreteLoss
            use_target_weight: true
            beta: 10.0
            label_softmax: true
          y:
            type: KLDiscreteLoss
            use_target_weight: true
            beta: 10.0
            label_softmax: true
        predictor:
          type: SimCCPredictor
          simcc_split_ratio: 2.0
          sigma: [5.66, 5.66]
          decode_beta: 150.0
        input_size: [256, 256]
        in_channels: 512
        out_channels: 19
        in_featuremap_size: [8, 8]
        simcc_split_ratio: 2.0
        final_layer_kernel_size: 7
        gau_cfg:
          hidden_dims: 256
          s: 128
          expansion_factor: 2
          dropout_rate: 0
          drop_path: 0.0
          act_fn: SiLU
          use_rel_bias: false
          pos_enc: false
