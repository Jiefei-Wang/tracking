default:
  type: RTMPose
  pretrained_backbone_checkpoint: input/DeepLabCutModelZoo-SuperAnimal-Quadruped/superanimal_quadruped_rtmpose_s.pt
  image_mean: [0.485, 0.456, 0.406]
  image_std: [0.229, 0.224, 0.225]
  model:
    backbone:
      type: CSPNeXt
      model_name: cspnext_s
      freeze_bn_stats: false
      freeze_bn_weights: false
      deepen_factor: 0.33
      widen_factor: 0.5
    heads:
      bodypart:
        type: RTMCCHead
        weight_init: RTMPose
        target_generator:
          type: SimCCGenerator
          input_size: [256, 256]
          smoothing_type: gaussian
          sigma: [5.66, 5.66]
          simcc_split_ratio: 2.0
          label_smooth_weight: 0.0
          normalize: false
        criterion:
          x:
            type: KLDiscreteLoss
            use_target_weight: true
            beta: 10.0
            label_softmax: true
          y:
            type: KLDiscreteLoss
            use_target_weight: true
            beta: 10.0
            label_softmax: true
        predictor:
          type: SimCCPredictor
          simcc_split_ratio: 2.0
          sigma: [5.66, 5.66]
          decode_beta: 150.0
        input_size: [256, 256]
        in_channels: 512
        out_channels: 19
        in_featuremap_size: [8, 8]
        simcc_split_ratio: 2.0
        final_layer_kernel_size: 7
        gau_cfg:
          hidden_dims: 256
          s: 128
          expansion_factor: 2
          dropout_rate: 0
          drop_path: 0.0
          act_fn: SiLU
          use_rel_bias: false
          pos_enc: false
